<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Kanban Board</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="kanban.css" />
  <script src="kanban.js" defer></script>
  <link rel="stylesheet" href="account.css" />
  <script src="account.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Board</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html">Slides</a>
        <a href="kanban.html" class="active">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html">Docs</a>
        <a href="projects.html">Projects</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="board-header">
      <h1 class="board-title" id="boardTitle" contenteditable="true" spellcheck="false">My Board</h1>
      <div class="board-actions">
        <div class="filter-bar">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="high">🔴 High</button>
          <button type="button" class="filter-btn" data-filter="medium">🟡 Medium</button>
          <button type="button" class="filter-btn" data-filter="low">🟢 Low</button>
          <button type="button" class="filter-btn" data-filter="overdue">⚠ Overdue</button>
        </div>
        <div class="view-toggle">
          <button type="button" class="view-toggle-btn active" data-view="board">Board</button>
          <button type="button" class="view-toggle-btn" data-view="list">List</button>
          <button type="button" class="view-toggle-btn" data-view="gantt">Gantt</button>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="addColumnBtn">+ Add column</button>
        <button type="button" class="btn btn-primary btn-sm" id="planProjectBtn">Plan project</button>
        <button type="button" class="btn btn-ghost btn-sm" id="notifBtn" id="notifBtn" title="Enable reminders">🔔 Reminders</button>
      </div>
    </div>

    <div class="board" id="board"></div>
    <div id="listView" hidden></div>
    <div id="ganttView" hidden></div>
  </main>

  <!-- Card modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="cardModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">New card</h2>
        <button type="button" class="modal-close" id="modalClose" aria-label="Close">×</button>
      </div>
      <div class="modal-two-col">

        <!-- LEFT: title, tags/project, description, comments -->
        <div class="modal-left">
          <div class="field">
            <label for="cardTitle">Title</label>
            <input type="text" id="cardTitle" placeholder="Card title" autocomplete="off" />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="cardTags">Tags <span class="field-hint">(comma-separated)</span></label>
              <input type="text" id="cardTags" placeholder="work, urgent, design" autocomplete="off" />
            </div>
            <div class="field">
              <label for="cardProject">Project</label>
              <select id="cardProject">
                <option value="">None</option>
              </select>
            </div>
          </div>
          <div class="field modal-desc-field">
            <label>Description</label>
            <div class="rte-wrap">
              <div class="rte-toolbar" id="rteToolbar">
                <button type="button" class="rte-btn" data-cmd="bold" title="Bold"><b>B</b></button>
                <button type="button" class="rte-btn" data-cmd="italic" title="Italic"><i>I</i></button>
                <button type="button" class="rte-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
                <span class="rte-divider"></span>
                <button type="button" class="rte-btn" data-cmd="insertUnorderedList" title="Bullet list">
                  <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="14" height="14"><rect x="1" y="3" width="2" height="2" rx="1"/><rect x="5" y="3" width="10" height="2" rx="1"/><rect x="1" y="7" width="2" height="2" rx="1"/><rect x="5" y="7" width="10" height="2" rx="1"/><rect x="1" y="11" width="2" height="2" rx="1"/><rect x="5" y="11" width="10" height="2" rx="1"/></svg>
                </button>
                <button type="button" class="rte-btn" id="rteCheckboxBtn" title="Add checkbox">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" width="14" height="14"><rect x="1.5" y="2.5" width="6" height="6" rx="1.2"/><polyline points="2.8,5.5 4.2,7 6.5,4"/><line x1="9.5" y1="4" x2="14.5" y2="4"/><line x1="9.5" y1="8" x2="14.5" y2="8"/><line x1="9.5" y1="12" x2="14.5" y2="12"/><rect x="1.5" y="9.5" width="6" height="4" rx="1.2"/></svg>
                </button>
              </div>
              <div id="cardDesc" class="rte-editor" contenteditable="true" spellcheck="true" data-placeholder="Add details…"></div>
            </div>
          </div>
          <div class="field" id="commentsField">
            <label>Comments</label>
            <div class="comments-list" id="commentsList"></div>
            <div class="comment-input-row">
              <textarea id="commentInput" rows="2" placeholder="Add a comment…"></textarea>
              <button type="button" class="btn btn-ghost btn-sm" id="addCommentBtn">Post</button>
            </div>
          </div>
        </div>

        <!-- RIGHT: sidebar panels -->
        <div class="modal-right">
          <div class="modal-sidebar-group" id="cardMoveWrap"></div>
          <div class="modal-sidebar-group">
            <div class="field">
              <label for="cardPriority">Priority</label>
              <select id="cardPriority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
            <div class="field">
              <label for="cardColumn">Column</label>
              <select id="cardColumn"></select>
            </div>
          </div>
          <div class="modal-sidebar-group">
            <div class="field">
              <label for="cardType">Type</label>
              <select id="cardType">
                <option value="story">📋 Story</option>
                <option value="epic">🔷 Epic</option>
                <option value="project">🏗 Project</option>
              </select>
            </div>
            <div class="field" id="cardParentField">
              <label for="cardParent">Parent</label>
              <select id="cardParent">
                <option value="">— None —</option>
              </select>
            </div>
          </div>
          <div class="modal-sidebar-group">
            <div class="field">
              <label for="cardStart">Start date</label>
              <input type="date" id="cardStart" />
            </div>
            <div class="field">
              <label for="cardDue">Due date</label>
              <input type="date" id="cardDue" />
            </div>
            <div class="field">
              <label for="cardReminder">Reminder</label>
              <input type="date" id="cardReminder" />
            </div>
          </div>
          <div class="modal-sidebar-group modal-linked-content">
            <span class="modal-sidebar-label">Linked content</span>
            <div class="attach-sections" id="attachSections"></div>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost btn-sm danger" id="deleteCardBtn" hidden>Delete card</button>
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="modalCancel">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Plan project modal -->
  <div class="modal-overlay" id="planOverlay" hidden>
    <div class="modal plan-modal" role="dialog" aria-modal="true" aria-labelledby="planModalTitle">
      <div class="modal-header">
        <h2 id="planModalTitle">Plan my project</h2>
        <button type="button" class="modal-close" id="planModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Upload a document</label>
          <div class="plan-upload-row">
            <label class="btn btn-ghost btn-sm plan-file-btn">
              Choose file
              <input type="file" id="planFileInput" accept=".txt,.md,.csv,.rtf" />
            </label>
            <span class="plan-file-name" id="planFileName">No file chosen</span>
          </div>
        </div>
        <div class="field">
          <label for="planDocText">Or paste content</label>
          <textarea id="planDocText" rows="8" placeholder="Paste your project brief, requirements doc, meeting notes, or any text describing work to be done…"></textarea>
        </div>
        <div class="field">
          <label for="planTargetCol">Add cards to</label>
          <select id="planTargetCol"></select>
        </div>
        <div class="plan-status" id="planStatus" hidden></div>
      </div>
      <div class="modal-footer">
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="planCancelBtn">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="planGenerateBtn">Generate cards</button>
      </div>
    </div>
  </div>

  <!-- Attachment preview overlay -->
  <div class="preview-overlay" id="previewOverlay" hidden>
    <div class="preview-panel">
      <div class="preview-header">
        <h2 id="previewTitle">Preview</h2>
        <div class="preview-header-actions">
          <a id="previewOpenLink" href="#" class="btn btn-ghost btn-sm">Open</a>
          <button type="button" class="preview-close" id="previewClose" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Saved in your browser.</p>
    </div>
  </footer>
</body>
</html>
