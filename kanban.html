<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Kanban Board</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="kanban.css" />
  <script src="kanban.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Board</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html">Slides</a>
        <a href="kanban.html" class="active">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html">Docs</a>
        <a href="projects.html">Projects</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="board-header">
      <h1 class="board-title" id="boardTitle" contenteditable="true" spellcheck="false">My Board</h1>
      <div class="board-actions">
        <div class="filter-bar">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="high">🔴 High</button>
          <button type="button" class="filter-btn" data-filter="medium">🟡 Medium</button>
          <button type="button" class="filter-btn" data-filter="low">🟢 Low</button>
          <button type="button" class="filter-btn" data-filter="overdue">⚠ Overdue</button>
        </div>
        <div class="view-toggle">
          <button type="button" class="view-toggle-btn active" data-view="board">Board</button>
          <button type="button" class="view-toggle-btn" data-view="gantt">Gantt</button>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="addColumnBtn">+ Add column</button>
        <button type="button" class="btn btn-primary btn-sm" id="planProjectBtn">Plan project</button>
        <button type="button" class="btn btn-ghost btn-sm" id="notifBtn" id="notifBtn" title="Enable reminders">🔔 Reminders</button>
      </div>
    </div>

    <div class="board" id="board"></div>
    <div id="ganttView" hidden></div>
  </main>

  <!-- Card modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="cardModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">New card</h2>
        <button type="button" class="modal-close" id="modalClose" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="cardTitle">Title</label>
          <input type="text" id="cardTitle" placeholder="Card title" autocomplete="off" />
        </div>
        <div class="field">
          <label for="cardDesc">Description</label>
          <textarea id="cardDesc" rows="4" placeholder="Add details…"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cardPriority">Priority</label>
            <select id="cardPriority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="field">
            <label for="cardColumn">Column</label>
            <select id="cardColumn"></select>
          </div>
        </div>
        <div class="field-row field-row-3">
          <div class="field">
            <label for="cardStart">Start date</label>
            <input type="date" id="cardStart" />
          </div>
          <div class="field">
            <label for="cardDue">Due date</label>
            <input type="date" id="cardDue" />
          </div>
          <div class="field">
            <label for="cardReminder">Reminder</label>
            <input type="date" id="cardReminder" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cardTags">Tags <span class="field-hint">(comma-separated)</span></label>
            <input type="text" id="cardTags" placeholder="work, urgent, design" autocomplete="off" />
          </div>
          <div class="field">
            <label for="cardProject">Project</label>
            <select id="cardProject">
              <option value="">None</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost btn-sm danger" id="deleteCardBtn" hidden>Delete card</button>
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="modalCancel">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Plan project modal -->
  <div class="modal-overlay" id="planOverlay" hidden>
    <div class="modal plan-modal" role="dialog" aria-modal="true" aria-labelledby="planModalTitle">
      <div class="modal-header">
        <h2 id="planModalTitle">Plan my project</h2>
        <button type="button" class="modal-close" id="planModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Upload a document</label>
          <div class="plan-upload-row">
            <label class="btn btn-ghost btn-sm plan-file-btn">
              Choose file
              <input type="file" id="planFileInput" accept=".txt,.md,.csv,.rtf" />
            </label>
            <span class="plan-file-name" id="planFileName">No file chosen</span>
          </div>
        </div>
        <div class="field">
          <label for="planDocText">Or paste content</label>
          <textarea id="planDocText" rows="8" placeholder="Paste your project brief, requirements doc, meeting notes, or any text describing work to be done…"></textarea>
        </div>
        <div class="field">
          <label for="planTargetCol">Add cards to</label>
          <select id="planTargetCol"></select>
        </div>
        <div class="plan-status" id="planStatus" hidden></div>
      </div>
      <div class="modal-footer">
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="planCancelBtn">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="planGenerateBtn">Generate cards</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Saved in your browser.</p>
    </div>
  </footer>
</body>
</html>
