<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Slide Decks</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="slides.css" />
  <link rel="stylesheet" href="version-history.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <script src="version-history.js" defer></script>
  <script src="shared-tasks.js" defer></script>
  <script src="slides.js" defer></script>
  <link rel="stylesheet" href="account.css" />
  <script src="account.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
  <link rel="stylesheet" href="feedback.css" />
  <script src="feedback.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Slides</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html" class="active">Slides</a>
        <a href="kanban.html">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html">Docs</a>
        <a href="projects.html">Collections</a>
      </nav>
    </div>
  </header>

  <main class="app">
    <!-- Slide list sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header project-header">
        <select id="projectSelect" title="Switch project"></select>
        <button type="button" class="btn btn-ghost btn-sm" id="newProjectBtn" title="New project">+</button>
        <button type="button" class="btn btn-ghost btn-sm danger" id="deleteProjectBtn" title="Delete project">🗑</button>
      </div>
      <div class="sidebar-header team-move-wrap" id="deckMoveWrap" style="padding:2px 12px 6px;gap:6px"></div>
      <div class="sidebar-header">
        <h3>Slides</h3>
        <button type="button" class="btn btn-ghost btn-sm" id="addSlideBtn">+ Add</button>
      </div>
      <ol class="slide-list" id="slideList"></ol>
    </aside>

    <!-- Main area -->
    <section class="main-area">
      <!-- Slide preview -->
      <div class="slide-stage">
        <div class="slide-frame" id="slideFrame">
          <div class="slide-preview" id="slidePreview"></div>
        </div>
        <div class="slide-nav">
          <button type="button" class="btn btn-ghost btn-sm" id="prevSlideBtn">← Prev</button>
          <span class="slide-counter" id="slideCounter">1 / 1</span>
          <button type="button" class="btn btn-ghost btn-sm" id="nextSlideBtn">Next →</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-panel">
        <div class="control-group">
          <div class="field">
            <label for="templateSelect">Template</label>
            <select id="templateSelect"></select>
          </div>
          <div class="field">
            <label for="deckProjectSelect">Link to Project</label>
            <select id="deckProjectSelect">
              <option value="">None</option>
            </select>
          </div>
          <div class="field">
            <label for="slideFontSelect">Font</label>
            <select id="slideFontSelect">
              <option value='system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'>System</option>
              <option value='"Helvetica Neue", Arial, sans-serif'>Sans-serif</option>
              <option value='Georgia, "Times New Roman", serif'>Serif</option>
              <option value='Menlo, Consolas, "Courier New", monospace'>Monospace</option>
              <option value='"Comic Sans MS", "Chalkboard SE", cursive'>Casual</option>
            </select>
          </div>
          <div class="field">
            <label for="textColorInput">Text color</label>
            <div class="color-field">
              <input type="color" id="textColorInput" value="#ffffff" />
              <span class="color-hex" id="textColorHex">#ffffff</span>
            </div>
          </div>
          <div class="field">
            <label for="bgColorInput">Background</label>
            <div class="color-field">
              <input type="color" id="bgColorInput" value="#1a1a2e" />
              <span class="color-hex" id="bgColorHex">#1a1a2e</span>
            </div>
          </div>
        </div>

        <div class="control-group actions-group">
          <button type="button" class="btn btn-primary btn-sm" id="generateDeckBtn">Generate deck</button>
          <button type="button" class="btn btn-ghost btn-sm" id="duplicateSlideBtn">Duplicate slide</button>
          <button type="button" class="btn btn-ghost btn-sm danger" id="deleteSlideBtn">Delete slide</button>
          <span class="spacer"></span>
          <button type="button" class="btn btn-ghost btn-sm" id="exportPngSlideBtn">Export slide PNG</button>
          <button type="button" class="btn btn-ghost btn-sm" id="exportAllPngBtn">Export all PNGs</button>
          <button type="button" class="btn btn-ghost btn-sm" id="exportHtmlBtn">Export HTML deck</button>
          <button type="button" class="btn btn-ghost btn-sm" id="printBtn">Print / PDF</button>
          <button type="button" class="btn btn-ghost btn-sm" id="historyBtn">History</button>
        </div>
      </div>

      <!-- Deck library -->
      <div class="deck-library-wrap">
        <h3 class="deck-library-heading">All decks</h3>
        <div class="deck-library" id="deckLibrary"></div>
        <p class="deck-library-empty" id="deckLibraryEmpty" hidden>No decks yet.</p>
      </div>
    </section>

    <!-- Comments panel -->
    <aside class="comments-panel" id="commentsPanel" hidden>
      <div class="comments-header">
        <h3>Comments</h3>
        <span class="comments-count" id="commentsCount"></span>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <p class="comments-empty" id="commentsEmpty">Highlight text and right-click to add a comment.</p>
    </aside>

    <!-- Context menu for adding comments -->
    <div class="slide-context-menu" id="slideContextMenu" hidden>
      <button class="ctx-menu-item" id="ctxAddComment">Add Comment</button>
    </div>
  </main>

  <!-- Generate deck modal -->
  <div class="modal-overlay" id="genOverlay" hidden>
    <div class="gen-modal" role="dialog" aria-modal="true">
      <div class="gen-modal-header">
        <h2>Generate a deck</h2>
        <button type="button" class="modal-close" id="genCloseBtn" aria-label="Close">&times;</button>
      </div>
      <div class="gen-modal-body">
        <div class="field">
          <label>Upload a document</label>
          <div class="gen-upload-row">
            <label class="btn btn-ghost btn-sm gen-file-btn">
              Choose file
              <input type="file" id="genFileInput" accept=".txt,.md,.csv,.rtf" />
            </label>
            <span class="gen-file-name" id="genFileName">No file chosen</span>
          </div>
        </div>
        <div class="field">
          <label for="genDocText">Or paste content</label>
          <textarea id="genDocText" rows="8" placeholder="Paste a project brief, report, meeting notes, or any text to turn into a slide deck…"></textarea>
        </div>
        <div class="gen-status" id="genStatus" hidden></div>
      </div>
      <div class="gen-modal-footer">
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="genCancelBtn">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="genGoBtn">Generate deck</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Template-based slide decks.</p>
    </div>
  </footer>
</body>
</html>
