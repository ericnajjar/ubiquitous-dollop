<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Docs</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="docs.css" />
  <link rel="stylesheet" href="version-history.css" />
  <script src="version-history.js" defer></script>
  <script src="shared-tasks.js" defer></script>
  <script src="docs.js" defer></script>
  <link rel="stylesheet" href="account.css" />
  <script src="account.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
  <link rel="stylesheet" href="presence.css" />
  <script src="presence.js" defer></script>
  <link rel="stylesheet" href="agent-chat.css" />
  <script src="agent-chat.js" defer></script>
  <link rel="stylesheet" href="feedback.css" />
  <script src="feedback.js" defer></script>
  <link rel="stylesheet" href="highlight-to-note.css" />
  <script src="highlight-to-note.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Docs</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html">Slides</a>
        <a href="kanban.html">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html" class="active">Docs</a>
        <a href="projects.html">Collections</a>
        <a href="agents.html">Agents</a>
      </nav>
    </div>
  </header>

  <main class="docs-app">
    <aside class="docs-sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Documents</h3>
        <div class="sidebar-actions">
          <button type="button" class="btn btn-ghost btn-sm" id="newFolderBtn" title="New folder">📁</button>
          <button type="button" class="btn btn-ghost btn-sm" id="newDocBtn">+ New</button>
        </div>
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
      <p class="doc-list-empty" id="docListEmpty" hidden>No documents yet.</p>
    </aside>

    <section class="docs-editor" id="editorPanel">
      <div class="editor-header" id="editorHeader">
        <input type="text" class="editor-title" id="docTitle" placeholder="Document title…" autocomplete="off" />
        <div class="editor-actions">
          <div class="editor-field">
            <label for="docFolder">Folder</label>
            <select id="docFolder">
              <option value="">No Folder</option>
            </select>
          </div>
          <div class="editor-field">
            <label for="docProject">Collection</label>
            <select id="docProject">
              <option value="">None</option>
            </select>
          </div>
          <div class="editor-field team-move-wrap" id="docMoveWrap"></div>
          <button type="button" class="btn btn-ghost btn-sm" id="addTaskBtn2">Add Tasks</button>
          <button type="button" class="btn btn-ghost btn-sm" id="addStoryBtn">Story Template</button>
          <button type="button" class="btn btn-ghost btn-sm" id="historyBtn">History</button>
          <button type="button" class="btn btn-ghost btn-sm danger" id="deleteDocBtn">Delete</button>
        </div>
      </div>
      <p class="editor-empty" id="editorEmpty">Select or create a document to get started.</p>
      <div class="prose-toolbar" id="proseToolbar" hidden>
        <button type="button" class="prose-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" class="prose-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" class="prose-btn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <button type="button" class="prose-btn" data-cmd="strikeThrough" title="Strikethrough (Ctrl+Shift+X)"><s>S</s></button>
        <span class="prose-sep"></span>
        <button type="button" class="prose-btn" data-cmd="formatBlock" data-val="h2" title="Heading 2">H2</button>
        <button type="button" class="prose-btn" data-cmd="formatBlock" data-val="h3" title="Heading 3">H3</button>
        <button type="button" class="prose-btn" data-cmd="formatBlock" data-val="p" title="Paragraph">¶</button>
        <button type="button" class="prose-btn" data-cmd="formatBlock" data-val="blockquote" title="Blockquote">"</button>
        <button type="button" class="prose-btn" data-cmd="formatBlock" data-val="pre" title="Code block">&lt;/&gt;</button>
        <span class="prose-sep"></span>
        <button type="button" class="prose-btn" data-cmd="insertUnorderedList" title="Bullet list">•</button>
        <button type="button" class="prose-btn" data-cmd="insertOrderedList" title="Numbered list">1.</button>
        <button type="button" class="prose-btn" data-cmd="insertHorizontalRule" title="Horizontal rule">—</button>
        <span class="prose-sep"></span>
        <button type="button" class="prose-btn" data-cmd="justifyLeft" title="Align left">≡</button>
        <button type="button" class="prose-btn" data-cmd="justifyCenter" title="Align center">≡</button>
        <button type="button" class="prose-btn" data-cmd="justifyRight" title="Align right">≡</button>
        <span class="prose-sep"></span>
        <button type="button" class="prose-btn" id="insertLinkBtn" title="Insert link (Ctrl+K)">🔗</button>
        <button type="button" class="prose-btn" id="inlineCodeBtn" title="Inline code">mono</button>
        <span class="prose-sep"></span>
        <div class="prose-export-wrap">
          <button type="button" class="prose-btn" id="exportBtn" title="Export document">Export ▾</button>
          <div class="prose-export-menu" id="exportMenu" hidden>
            <button type="button" class="prose-export-item" data-format="pdf">PDF / Print</button>
            <button type="button" class="prose-export-item" data-format="markdown">Markdown (.md)</button>
            <button type="button" class="prose-export-item" data-format="html">HTML (.html)</button>
          </div>
        </div>
        <span class="prose-spacer"></span>
        <span class="prose-word-count" id="wordCount"></span>
      </div>
      <div class="doc-blocks" id="docBlocks"></div>
      <div class="stories-divider" id="storiesDivider" hidden>
        <span>Stories</span>
      </div>
      <div class="stories-container" id="storiesContainer"></div>
    </section>

    <aside class="comments-panel" id="commentsPanel" hidden>
      <div class="comments-header">
        <h3>Comments</h3>
        <span class="comments-count" id="commentsCount"></span>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <p class="comments-empty" id="commentsEmpty">Highlight text and right-click to add a comment.</p>
    </aside>

    <div class="doc-context-menu" id="docContextMenu" hidden>
      <button class="ctx-menu-item" id="ctxAddComment">Add Comment</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Saved in your browser.</p>
    </div>
  </footer>
</body>
</html>
