<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Teams</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="teams.css" />
  <script src="teams.js" defer></script>
  <link rel="stylesheet" href="account.css" />
  <script src="account.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Teams</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html">Slides</a>
        <a href="kanban.html">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html">Docs</a>
        <a href="projects.html">Projects</a>
      </nav>
    </div>
  </header>

  <main class="teams-main">
    <div class="teams-toolbar">
      <h1>Teams</h1>
      <div class="teams-actions">
        <button type="button" class="btn btn-ghost btn-sm" id="joinTeamBtn">Join team</button>
        <button type="button" class="btn btn-primary btn-sm" id="createTeamBtn">+ Create team</button>
      </div>
    </div>

    <div class="teams-inline-form" id="createForm" hidden>
      <input type="text" id="newTeamName" placeholder="Team name…" autocomplete="off" />
      <button type="button" class="btn btn-primary btn-sm" id="createConfirm">Create</button>
      <button type="button" class="btn btn-ghost btn-sm" id="createCancel">Cancel</button>
      <span class="form-msg" id="createError"></span>
    </div>

    <div class="teams-inline-form" id="joinForm" hidden>
      <input type="text" id="joinCode" placeholder="Paste invite code…" autocomplete="off" />
      <button type="button" class="btn btn-primary btn-sm" id="joinConfirm">Join</button>
      <button type="button" class="btn btn-ghost btn-sm" id="joinCancel">Cancel</button>
      <span class="form-msg" id="joinError"></span>
    </div>

    <div class="teams-grid" id="teamsGrid"></div>
    <p class="teams-empty" id="teamsEmpty" hidden>No teams yet. Create or join a team to collaborate.</p>
    <p class="teams-loading" id="teamsLoading">Loading teams…</p>
  </main>

  <!-- Team detail modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="teamModal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modalTeamName"></h2>
        <button type="button" class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="invite-section">
          <label>Invite Code</label>
          <div class="invite-row">
            <code id="modalInviteCode"></code>
            <button type="button" class="btn btn-ghost btn-sm" id="copyCodeBtn">Copy</button>
          </div>
          <p class="invite-hint">Share this code so others can join your team.</p>
        </div>
        <div class="members-section">
          <h3>Members</h3>
          <div class="members-list" id="modalMembers"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost btn-sm danger" id="leaveTeamBtn">Leave team</button>
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="modalDone">Done</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Saved to your account.</p>
    </div>
  </footer>
</body>
</html>
