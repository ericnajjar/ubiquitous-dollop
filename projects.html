<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Collections</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="projects.css" />
  <script src="projects.js" defer></script>
  <link rel="stylesheet" href="account.css" />
  <script src="account.js" defer></script>
  <link rel="stylesheet" href="mascot.css" />
  <script src="mascot.js" defer></script>
  <link rel="stylesheet" href="agent-chat.css" />
  <script src="agent-chat.js" defer></script>
  <link rel="stylesheet" href="feedback.css" />
  <script src="feedback.js" defer></script>
  <link rel="stylesheet" href="highlight-to-note.css" />
  <script src="highlight-to-note.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope Collections</span>
      </a>
      <nav class="site-nav">
        <a href="charts.html">Charts</a>
        <a href="slides.html">Slides</a>
        <a href="kanban.html">Board</a>
        <a href="notes.html">Notes</a>
        <a href="canvas.html">Canvas</a>
        <a href="docs.html">Docs</a>
        <a href="projects.html" class="active">Collections</a>
        <a href="agents.html">Agents</a>
      </nav>
    </div>
  </header>

  <main class="collections-layout">
    <!-- Left sidebar -->
    <aside class="collections-sidebar" id="collectionsSidebar">
      <div class="sidebar-header">
        <h2>Collections</h2>
        <button type="button" class="btn btn-primary btn-sm" id="newCollectionBtn">+ New</button>
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
      <p class="sidebar-empty" id="sidebarEmpty" hidden>No collections yet.</p>
    </aside>

    <!-- Right detail -->
    <section class="collection-detail" id="collectionDetail">
      <div class="detail-placeholder" id="detailPlaceholder">
        <p>Select a collection or create a new one.</p>
      </div>

      <div class="detail-content" id="detailContent" hidden>
        <div class="detail-header">
          <h1 id="detailName" contenteditable="true" spellcheck="false" data-placeholder="Collection name"></h1>
          <div class="detail-actions">
            <button type="button" class="btn btn-ghost btn-sm danger" id="deleteCollectionBtn">Delete</button>
          </div>
        </div>

        <div class="detail-desc-wrap">
          <textarea id="detailDesc" rows="3" placeholder="Add a description…"></textarea>
        </div>

        <div class="detail-sections" id="detailSections"></div>

        <div class="detail-add-bar" id="detailAddBar"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="year"></span> DataScope. Saved in your browser.</p>
    </div>
  </footer>
</body>
</html>
