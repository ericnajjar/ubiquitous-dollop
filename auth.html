<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataScope — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cloud-sync.js"></script>
  <link rel="stylesheet" href="auth.css" />
  <script src="auth-page.js" defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">DataScope</span>
      </div>
      <h1 id="authTitle">Sign in</h1>
      <form id="authForm" autocomplete="on">
        <div class="auth-field">
          <label for="emailInput">Email</label>
          <input type="email" id="emailInput" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="auth-field">
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" required autocomplete="current-password" minlength="6" placeholder="••••••••" />
        </div>
        <div class="auth-error" id="authError" hidden></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign in</button>
      </form>
      <p class="auth-toggle" id="authToggle">
        <span id="toggleText">Don't have an account?</span>
        <button type="button" id="toggleBtn" class="auth-toggle-btn">Sign up</button>
      </p>
      <div id="noConfig" class="auth-no-config" hidden>
        <p>Cloud sync is not configured yet.</p>
        <p>To enable accounts, add your Supabase credentials to <code>supabase-config.js</code>.</p>
        <a href="index.html" class="btn btn-ghost">Continue in local mode &rarr;</a>
      </div>
    </div>
  </div>
</body>
</html>
